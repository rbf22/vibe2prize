<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Playfair+Display:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: #FFFFFF;
            font-family: 'Playfair Display', serif;
            display: flex;
            position: relative;
            overflow: hidden;
        }
        .left-panel {
            width: 65%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 80px;
            z-index: 2;
        }
        .right-panel {
            width: 35%;
            background: #E0E0E0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
            border-left: 10px solid #000000;
        }
        .main-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 110px;
            line-height: 0.9;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: -4px;
            margin-bottom: 20px;
        }
        .sub-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 42px;
            color: #2F4F4F;
            margin-bottom: 40px;
        }
        .description {
            font-size: 24px;
            line-height: 1.4;
            color: #000000;
            margin-bottom: 30px;
            font-style: italic;
        }
        .tagline {
            font-family: 'Space Mono', monospace;
            font-size: 18px;
            color: #2F4F4F;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-top: 2px solid #000000;
            padding-top: 15px;
            display: inline-block;
        }
        .nav-marker {
            position: absolute;
            top: 40px;
            left: 40px;
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            color: #000000;
            transform: rotate(-90deg);
            transform-origin: left top;
        }
        .accent-block {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200px;
            height: 20px;
            background: #000000;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="nav-marker">ISSUE NO. 01 // H2 2026</div>
        <div class="left-panel">
            <h1 class="main-title">AI IN<br>ACTION</h1>
            <h2 class="sub-title">From Lab to Launch</h2>
            <div class="accent-block"></div>
        </div>
        <div class="right-panel">
            <p class="description">A working session to align R&D and IT on high-impact AI initiatives for H2 2026 and H1 2027.</p>
            <div class="tagline">Let's build what matters.</div>
        </div>
    </div>
</body>
</html>
